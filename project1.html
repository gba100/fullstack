    <section id="pagessize">
        <h1 class="text-center text-white ">Weather App</h1>
        <form class="form text-center">

            <input type="text" id="city" placeholder="Enter city" name="city" required>
            <button type="submit" class="mt-3" id="submit-btn">Get Forecast</button>
        </form>
        <div class="containerproj1">
            <div class="boxweather">
                <div id="day" class="weather-info day current ">
                    <div class="weather-info__item">
                        <h2 id="cityName" class="text-center mt-3 "></h2>
                        <div id="icon"></div>
                        <h1 id="temp" class="text-center"></h1>
                        <div id="desc" class="text-center"></div>
                        <div id="humidity" class="text-center"></div>
                        <div id="windSpeed" class="text-center"></div>
                        <div id="sunrise" class="text-center"></div>
                        <div id="sunset" class="text-center"></div>
                    </div>
                </div>
            </div>

        <script>

            });
